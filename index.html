<!-- Reemplaza el bloque del PANEL ADMINISTRATIVO (SECRETO) por este nuevo código -->

<div id="admin-panel" class="hidden-panel mt-8 bg-slate-950 text-white p-8 rounded-[2.5rem] shadow-2xl border border-slate-800">
    <div class="flex justify-between items-center mb-6">
        <div>
            <h2 class="text-xl font-black text-blue-400 tracking-tight">COLKA <span class="text-white">COMMUNICATOR</span></h2>
            <p id="user-status" class="text-[10px] font-bold text-emerald-400 uppercase tracking-widest">Sesión: Administrador</p>
        </div>
        <button onclick="cerrarSesion()" class="text-[10px] font-bold text-slate-400 border border-slate-700 px-4 py-2 rounded-xl hover:bg-red-500/10 hover:text-red-400 transition-all">SALIR DEL SISTEMA</button>
    </div>

    <!-- AREA DE CHAT -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
        
        <!-- Lista de Contactos (Opcional) -->
        <div class="hidden md:block space-y-3">
            <div class="p-3 bg-blue-600/10 border border-blue-500/30 rounded-2xl">
                <p class="text-[9px] font-black text-blue-400 uppercase">Chat Global</p>
                <p class="text-xs font-bold mt-1">Canal de Ventas</p>
            </div>
            <div class="p-3 bg-slate-900 border border-slate-800 rounded-2xl opacity-50">
                <p class="text-[9px] font-black text-slate-500 uppercase">Privado</p>
                <p class="text-xs font-bold mt-1">Soporte Técnico</p>
            </div>
        </div>

        <!-- Ventana de Mensajes -->
        <div class="md:col-span-3 flex flex-col h-[400px] bg-slate-900 rounded-3xl border border-slate-800 overflow-hidden">
            <div id="chat-box" class="flex-1 p-6 overflow-y-auto space-y-4">
                <!-- Mensaje de ejemplo: Julio -->
                <div class="flex flex-col items-start">
                    <span class="text-[8px] font-black text-blue-400 mb-1 ml-2">JULIO (ADMIN)</span>
                    <div class="bg-blue-600 text-white p-3 rounded-2xl rounded-tl-none max-w-[80%] text-sm">
                        Hola, ¿ya terminaste de procesar los certificados de posesión?
                    </div>
                </div>

                <!-- Mensaje de ejemplo: Staff -->
                <div class="flex flex-col items-end">
                    <span class="text-[8px] font-black text-purple-400 mb-1 mr-2">COLABORADOR</span>
                    <div class="bg-slate-800 text-slate-200 p-3 rounded-2xl rounded-tr-none max-w-[80%] text-sm border border-slate-700">
                        Sí, Julio. Estoy terminando el último de Allpa Urcuna.
                    </div>
                </div>
            </div>

            <!-- Input de Mensaje -->
            <div class="p-4 bg-slate-950 border-t border-slate-800 flex gap-2">
                <input id="chat-input" type="text" placeholder="Escribe un mensaje..." class="flex-1 bg-slate-900 border border-slate-800 rounded-xl px-4 py-2 text-sm outline-none focus:border-blue-500">
                <button onclick="enviarMensaje()" class="bg-blue-600 p-2 rounded-xl hover:bg-blue-500 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                    </svg>
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    let usuarioActual = "";

    function verificarAcceso() {
        const nombreInput = document.getElementById('nombre').value.toUpperCase();
        
        if (nombreInput === "JULIO123") {
            usuarioActual = "JULIO (ADMIN)";
            mostrarChat("Administrador", "text-emerald-400");
        } else if (nombreInput === "USER456") {
            usuarioActual = "COLABORADOR";
            mostrarChat("Staff / Ventas", "text-purple-400");
        } else {
            document.getElementById('admin-panel').classList.add('hidden-panel');
            document.getElementById('certificado-container').classList.remove('hidden-panel');
            actualizar();
        }
    }

    function mostrarChat(rol, colorClase) {
        document.getElementById('admin-panel').classList.remove('hidden-panel');
        document.getElementById('certificado-container').classList.add('hidden-panel');
        const status = document.getElementById('user-status');
        status.innerText = `Sesión: ${rol}`;
        status.className = `text-[10px] font-bold uppercase tracking-widest ${colorClase}`;
        document.getElementById('nombre').value = "";
    }

    function enviarMensaje() {
        const input = document.getElementById('chat-input');
        const chatBox = document.getElementById('chat-box');
        
        if (input.value.trim() !== "") {
            const esAdmin = usuarioActual.includes("ADMIN");
            const alineacion = esAdmin ? "items-start" : "items-end";
            const colorBurbuja = esAdmin ? "bg-blue-600" : "bg-slate-800 border border-slate-700";
            const colorNombre = esAdmin ? "text-blue-400" : "text-purple-400";
            const rounded = esAdmin ? "rounded-tl-none" : "rounded-tr-none";

            const msgHtml = `
                <div class="flex flex-col ${alineacion}">
                    <span class="text-[8px] font-black ${colorNombre} mb-1 ${esAdmin ? 'ml-2' : 'mr-2'}">${usuarioActual}</span>
                    <div class="${colorBurbuja} text-white p-3 rounded-2xl ${rounded} max-w-[80%] text-sm shadow-lg">
                        ${input.value}
                    </div>
                </div>
            `;
            
            chatBox.innerHTML += msgHtml;
            input.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    }

    // Permitir enviar con la tecla Enter
    document.getElementById('chat-input')?.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') enviarMensaje();
    });
</script>
